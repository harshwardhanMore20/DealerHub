<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Review Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f6f9fc; }
        .hero { background: linear-gradient(135deg, #0f172a, #2563eb); color: white; padding: 3rem 0; }
        .card-img-top { height: 180px; object-fit: cover; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">DealerHub</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">Home</a>
      <a class="nav-link {% if '/about/' in request.path %}active{% endif %}" href="{% url 'about' %}">About Us</a>
      <a class="nav-link {% if '/contact/' in request.path %}active{% endif %}" href="{% url 'contact' %}">Contact Us</a>
      {% if user.is_authenticated %}
        <span class="nav-link text-info">{{ user.username }}</span>
        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="nav-link" href="{% url 'login' %}">Login</a>
        <a class="nav-link" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
